[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = ["npm install -g pnpm@9 --force && /root/.npm-global/bin/pnpm install --no-frozen-lockfile || npx pnpm@9 install --no-frozen-lockfile"]

[phases.build]
cmds = [
  "npx pnpm@9 --filter @workspace/api-server run build",
  "BASE_PATH=/ npx pnpm@9 --filter @workspace/loanmatch run build"
]

[start]
cmd = "cd lib/db && npx drizzle-kit push --config=drizzle.config.ts && cd ../.. && node artifacts/api-server/dist/index.mjs"