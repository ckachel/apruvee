[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = ["npm install -g pnpm && pnpm install --no-frozen-lockfile"]

[phases.build]
cmds = [
  "cd artifacts/api-server && pnpm run build",
  "cd artifacts/loanmatch && BASE_PATH=/ pnpm run build"
]

[start]
cmd = "node artifacts/api-server/dist/index.mjs"